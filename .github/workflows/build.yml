name: Build Morphe APKs and Magisk Modules

on:
  workflow_dispatch:
  schedule:
    # Ye script har din automatic run hogi (raat 10:30 UTC = subah 4:00 IST)
    - cron: '30 22 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Download Morphe Tools
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p tools
          
          echo "Downloading CLI..."
          CLI_URL=$(curl -s -H "Authorization: token $GITHUB_TOKEN" https://api.github.com/repos/MorpheApp/morphe-cli/releases/latest | grep "browser_download_url.*\.jar" | cut -d '"' -f 4 | head -n 1)
          CLI_FILENAME=$(basename "$CLI_URL")
          echo "CLI_FILENAME=$CLI_FILENAME" >> $GITHUB_ENV
          echo "Found CLI URL: $CLI_URL"
          wget -qO tools/cli.jar "$CLI_URL"
          
          echo "Downloading Patches..."
          PATCHES_URL=$(curl -s -H "Authorization: token $GITHUB_TOKEN" https://api.github.com/repos/MorpheApp/morphe-patches/releases/latest | grep "browser_download_url" | grep -E "\.jar|\.rvp|\.mpp" | cut -d '"' -f 4 | head -n 1)
          PATCH_FILENAME=$(basename "$PATCHES_URL")
          echo "PATCH_FILENAME=$PATCH_FILENAME" >> $GITHUB_ENV
          echo "Found Patches URL: $PATCHES_URL"
          wget -qO tools/patches.jar "$PATCHES_URL"
          
          ls -lh tools/
          if [ ! -s tools/cli.jar ] || [ ! -s tools/patches.jar ]; then 
            echo "Error: Tools download failed or file empty!"; exit 1; 
          fi
          echo "Tools verified successfully."

      - name: Download Original APKs (Dynamic Safe Mode)
        run: |
          mkdir -p apks
          
          echo "Fetching dynamic links from Archive API..."
          
          # YouTube Download
          YT_PATH=$(curl -s "https://archive.org/metadata/jhc-apks" | jq -r '.files[].name' | grep -i "youtube" | grep -v "music" | grep "\.apk$" | sort | tail -n 1)
          if [ -z "$YT_PATH" ]; then echo "YouTube APK not found!"; exit 1; fi
          echo "Downloading YouTube: $YT_PATH"
          curl -f -L -s "https://archive.org/download/jhc-apks/$YT_PATH" -o apks/youtube.apk
          echo "YT_CLEAN_NAME=$(basename "$YT_PATH" .apk)" >> $GITHUB_ENV
          
          # YT Music Download
          YTM_PATH=$(curl -s "https://archive.org/metadata/jhc-apks" | jq -r '.files[].name' | grep -i "youtube.music" | grep "\.apk$" | sort | tail -n 1)
          if [ -z "$YTM_PATH" ]; then echo "YT Music APK not found!"; exit 1; fi
          echo "Downloading YT Music: $YTM_PATH"
          curl -f -L -s "https://archive.org/download/jhc-apks/$YTM_PATH" -o apks/ytmusic.apk
          echo "YTM_CLEAN_NAME=$(basename "$YTM_PATH" .apk)" >> $GITHUB_ENV

          echo "--- Scanning for Reddit APK ---"
          REDDIT_DOWNLOADED=false
          
          echo "Trying Source 1 (Archive.org Dynamic)..."
          REDDIT_PATH=$(curl -s "https://archive.org/metadata/jhc-apks" | jq -r '.files[].name' | grep -i "reddit" | grep "\.apk$" | sort | tail -n 1)
          if [ -n "$REDDIT_PATH" ]; then
             echo "Found Reddit: $REDDIT_PATH"
             curl -f -L -s "https://archive.org/download/jhc-apks/$REDDIT_PATH" -o apks/reddit_tmp.apk || true
             if [ -s apks/reddit_tmp.apk ] && unzip -t apks/reddit_tmp.apk >/dev/null 2>&1; then
                mv apks/reddit_tmp.apk apks/reddit.apk
                REDDIT_DOWNLOADED=true
                echo "Success: Downloaded Reddit from Archive.org"
             fi
          fi
          
          if [ "$REDDIT_DOWNLOADED" = false ]; then
             echo "Trying Source 2 (APKMirror)..."
             curl -f -L -s "https://www.apkmirror.com/apk/redditinc/reddit/" -o apks/reddit_tmp.apk || true
             if [ -s apks/reddit_tmp.apk ] && unzip -t apks/reddit_tmp.apk >/dev/null 2>&1; then
                mv apks/reddit_tmp.apk apks/reddit.apk
                REDDIT_DOWNLOADED=true
                echo "Success: Downloaded Reddit from APKMirror"
             fi
          fi
          
          if [ "$REDDIT_DOWNLOADED" = false ]; then
             echo "Trying Source 3 (Uptodown)..."
             curl -f -L -s "https://reddit-official-app.en.uptodown.com/android/download" -o apks/reddit_tmp.apk || true
             if [ -s apks/reddit_tmp.apk ] && unzip -t apks/reddit_tmp.apk >/dev/null 2>&1; then
                mv apks/reddit_tmp.apk apks/reddit.apk
                REDDIT_DOWNLOADED=true
                echo "Success: Downloaded Reddit from Uptodown"
             fi
          fi
          
          if [ "$REDDIT_DOWNLOADED" = false ]; then
             echo "Warning: All sources failed. Reddit patching will be skipped."
             rm -f apks/reddit_tmp.apk
          fi

      - name: Build Non-Root APKs
        run: |
          echo "Patching YouTube Non-Root..."
          java -jar tools/cli.jar patch -p tools/patches.jar -o YouTube-NonRoot.apk apks/youtube.apk
          echo "Patching YT Music Non-Root..."
          java -jar tools/cli.jar patch -p tools/patches.jar -o YTMusic-NonRoot.apk apks/ytmusic.apk
          
          if [ -f "apks/reddit.apk" ]; then
             echo "Patching Reddit Non-Root..."
             java -jar tools/cli.jar patch -p tools/patches.jar -o Reddit-NonRoot.apk apks/reddit.apk || echo "Reddit patching failed, skipping..."
          else
             echo "Reddit APK not found. Skipping Reddit Non-Root patching."
          fi

      - name: Build Root APKs (For Magisk)
        run: |
          echo "Patching YouTube Root (GmsCore excluded)..."
          java -jar tools/cli.jar patch -p tools/patches.jar -e "GmsCore support" -o YouTube-Root.apk apks/youtube.apk
          echo "Patching YT Music Root (GmsCore excluded)..."
          java -jar tools/cli.jar patch -p tools/patches.jar -e "GmsCore support" -o YTMusic-Root.apk apks/ytmusic.apk
          
          if [ -f "apks/reddit.apk" ]; then
             echo "Patching Reddit Root..."
             java -jar tools/cli.jar patch -p tools/patches.jar -o Reddit-Root.apk apks/reddit.apk || echo "Reddit root patching failed, skipping..."
          else
             echo "Reddit APK not found. Skipping Reddit Root patching."
          fi

      - name: Create Magisk Modules
        run: |
          mkdir -p yt-magisk/system/product/app/YouTube
          cp YouTube-Root.apk yt-magisk/system/product/app/YouTube/YouTube.apk
          
          cat <<EOF > yt-magisk/module.prop
          id=morphe.yt
          name=YouTube Morphe
          version=1.0
          author=Builder
          EOF
          
          cd yt-magisk && zip -r9 ../YouTube-Magisk.zip . && cd ..

      - name: Generate Release Notes
        run: |
          cat <<EOF > release_notes.txt
          🚀 **New Morphe Build**
          
          📱 **YouTube:** $YT_CLEAN_NAME
          🎵 **YouTube Music:** $YTM_CLEAN_NAME
          
          ---
          
          ### 📌 Required Add-ons
          * **Install MicroG-RE:** [MicroG-RE Releases](https://github.com/morpheapp/MicroG-RE/releases) 
            *(for non-root YouTube and YT Music APKs)*
          * **Use Zygisk-Detach:** [Zygisk-Detach Releases](https://github.com/j-hc/zygisk-detach) 
            *(to detach root Morphe YouTube and YT Music from Play Store)*
          
          ---
          
          ### 🛠️ Build Tools Used
          * **CLI:** MorpheApp/$CLI_FILENAME
          * **Patches:** MorpheApp/$PATCH_FILENAME
          
          ### 📝 Changelog
          * Check the official patches changelog here: [Morphe Patches Latest Release](https://github.com/MorpheApp/morphe-patches/releases/latest)
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "Morphe Patched Builds #${{ github.run_number }}"
          body_path: release_notes.txt
          files: |
            *.apk
            *.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
