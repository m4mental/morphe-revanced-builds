name: Build Morphe APKs and Magisk Modules

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Download Morphe Tools
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p tools
          
          echo "Fetching Morphe CLI (Latest Stable)..."
          curl -s -H "Authorization: Bearer $GITHUB_TOKEN" https://api.github.com/repos/MorpheApp/morphe-cli/releases/latest > cli_api.json
          
          # Pehle .jar dhoondho, agar na mile toh koi bhi main asset utha lo
          CLI_URL=$(grep "browser_download_url" cli_api.json | cut -d '"' -f 4 | grep "\.jar" | head -n 1)
          if [ -z "$CLI_URL" ]; then
            CLI_URL=$(grep "browser_download_url" cli_api.json | cut -d '"' -f 4 | grep -v "\.json" | head -n 1)
          fi
          
          echo "Downloading CLI from: $CLI_URL"
          wget -qO tools/cli.jar "$CLI_URL"
          
          echo "Fetching Morphe Patches (Latest Stable)..."
          curl -s -H "Authorization: Bearer $GITHUB_TOKEN" https://api.github.com/repos/MorpheApp/morphe-patches/releases/latest > patches_api.json
          
          # Smart Search: .jar -> .rvp -> Any other file (except .json)
          PATCHES_URL=$(grep "browser_download_url" patches_api.json | cut -d '"' -f 4 | grep "\.jar" | head -n 1)
          if [ -z "$PATCHES_URL" ]; then
            PATCHES_URL=$(grep "browser_download_url" patches_api.json | cut -d '"' -f 4 | grep "\.rvp" | head -n 1)
          fi
          if [ -z "$PATCHES_URL" ]; then
            PATCHES_URL=$(grep "browser_download_url" patches_api.json | cut -d '"' -f 4 | grep -v "\.json" | head -n 1)
          fi
          
          if [ -z "$PATCHES_URL" ]; then 
            echo "Error: Is release me developer ne abhi tak koi patch file upload hi nahi ki hai!"
            exit 1
          fi
          
          echo "Downloading Patches from: $PATCHES_URL"
          wget -qO tools/patches.jar "$PATCHES_URL"
          
          if [ ! -s tools/cli.jar ] || [ ! -s tools/patches.jar ]; then 
            echo "Error: Downloaded tools are empty!"; exit 1; 
          fi
          echo "Stable Tools verified successfully!"

      - name: Download Original APKs
        run: |
          mkdir -p apks
          
          echo "Fetching latest APK directory from Archive.org (jhc-apks)..."
          # Archive.org ki metadata API ko call karke JSON save karna
          curl -sL "https://archive.org/metadata/jhc-apks" > jhc_metadata.json
          
          # YouTube ka latest APK path extract karna (Version ke hisab se sort karke sabse naya uthana)
          YT_PATH=$(jq -r '.files[].name' jhc_metadata.json | grep 'com.google.android.youtube/.*\.apk$' | sort -V | tail -n 1)
          if [ -z "$YT_PATH" ]; then
            echo "Error: YouTube APK directory me nahi mila!"
            exit 1
          fi
          
          # YT Music ka latest APK path extract karna
          YTM_PATH=$(jq -r '.files[].name' jhc_metadata.json | grep 'com.google.android.apps.youtube.music/.*\.apk$' | sort -V | tail -n 1)
          if [ -z "$YTM_PATH" ]; then
            echo "Error: YT Music APK directory me nahi mila!"
            exit 1
          fi
          
          echo "Found Latest YouTube: $YT_PATH"
          echo "Found Latest YT Music: $YTM_PATH"
          
          # Dynamically banayi gayi URL se download karna
          echo "Downloading YouTube APK..."
          curl -sL "https://archive.org/download/jhc-apks/$YT_PATH" -o apks/youtube.apk
          
          echo "Downloading YT Music APK..."
          curl -sL "https://archive.org/download/jhc-apks/$YTM_PATH" -o apks/ytmusic.apk
          
          # Verification: Ensure file size is valid (Corrupted html redirect nahi aaya)
          YT_SIZE=$(stat -c%s "apks/youtube.apk" 2>/dev/null || echo 0)
          echo "Downloaded YouTube Size: $YT_SIZE bytes"
          
          if [ "$YT_SIZE" -lt 10000000 ]; then 
            echo "Error: YouTube APK download failed or file is corrupted!"
            exit 1
          fi
          echo "Original APKs dynamically downloaded successfully!"

      - name: Build Non-Root APKs
        run: |
          echo "Building YouTube Non-Root..."
          java -jar tools/cli.jar patch -p tools/patches.jar -o YouTube-NonRoot.apk apks/youtube.apk
          
          echo "Building YT Music Non-Root..."
          java -jar tools/cli.jar patch -p tools/patches.jar -o YTMusic-NonRoot.apk apks/ytmusic.apk

      - name: Build Root APKs (For Magisk)
        run: |
          # Safe CLI syntax: input apk ko end me rakha hai aur single space ke sath exclude flags lagaye hain
          echo "Building YouTube Root..."
          java -jar tools/cli.jar patch -p tools/patches.jar -e gmscore-support -e microg-support -e custom-package-name -o YouTube-Root.apk apks/youtube.apk
          
          echo "Building YT Music Root..."
          java -jar tools/cli.jar patch -p tools/patches.jar -e gmscore-support -e microg-support -e custom-package-name -o YTMusic-Root.apk apks/ytmusic.apk

      - name: Create Magisk Modules
        run: |
          # Advanced Telegram-Style Magisk Installer (Auto-Downgrade & Lib Extraction)
          mkdir -p template/META-INF/com/google/android
          touch template/META-INF/com/google/android/updater-script
          
          cat << 'EOF' > template/META-INF/com/google/android/update-binary
          #!/system/bin/sh
          OUTFD=$2
          ZIPFILE=$3
          ui_print() { echo -n -e "ui_print $1\n" >&$OUTFD; echo -n -e "ui_print\n" >&$OUTFD; }
          
          ui_print "----------------------------------------"
          ui_print "   Morphe Advanced Root Installer       "
          ui_print "----------------------------------------"
          
          if [ -d "/data/adb/ksu" ]; then MODDIR="/data/adb/ksu/modules"; elif [ -d "/data/adb/ap" ]; then MODDIR="/data/adb/ap/modules"; else MODDIR="/data/adb/modules"; fi
          MODID=$(grep '^id=' "$ZIPFILE" | head -n1 | cut -d= -f2 | tr -d '\r')
          MODPATH="$MODDIR/$MODID"
          PKGNAME=$(grep '^package=' "$ZIPFILE" | head -n1 | cut -d= -f2 | tr -d '\r')
          
          rm -rf "$MODPATH"
          mkdir -p "$MODPATH"
          
          ui_print "- Downgrade detected, uninstalling old version..."
          pm uninstall "$PKGNAME" >/dev/null 2>&1
          pm uninstall --user 0 "$PKGNAME" >/dev/null 2>&1
          
          ui_print "- Extracting App..."
          unzip -qo "$ZIPFILE" "app.apk" -d "$MODPATH"
          unzip -qo "$ZIPFILE" "module.prop" -d "$MODPATH"
          unzip -qo "$ZIPFILE" "post-fs-data.sh" -d "$MODPATH"
          
          ui_print "- Extracting Native Libs From Bundle APKs..."
          mkdir -p "$MODPATH/lib/arm64-v8a" "$MODPATH/lib/armeabi-v7a"
          unzip -jo "$MODPATH/app.apk" "lib/arm64-v8a/*" -d "$MODPATH/lib/arm64-v8a" >/dev/null 2>&1
          unzip -jo "$MODPATH/app.apk" "lib/armeabi-v7a/*" -d "$MODPATH/lib/armeabi-v7a" >/dev/null 2>&1
          
          ui_print "- Mounting & Optimizing Morphe..."
          chmod -R 755 "$MODPATH"
          find "$MODPATH" -type f -exec chmod 644 {} +
          chmod 755 "$MODPATH/post-fs-data.sh" 2>/dev/null
          
          ui_print "- Module installed successfully! Please Reboot."
          exit 0
          EOF
          chmod 755 template/META-INF/com/google/android/update-binary

          # YouTube Root Module Build
          cp -r template yt-magisk
          cp YouTube-Root.apk yt-magisk/app.apk
          echo -e "id=morphe.yt\npackage=com.google.android.youtube\nname=YouTube Morphe (Advanced Root)\nversion=1.0\nauthor=${{ github.actor }}\ndescription=Morphe patched YouTube with auto-downgrade and dynamic mount." > yt-magisk/module.prop
          
          cat << 'EOF' > yt-magisk/post-fs-data.sh
          #!/system/bin/sh
          MODDIR=${0%/*}
          # Har phone me base.apk ka path alag hota hai, ye script automatically dhoondh legi
          for base in "YouTube.apk" "base.apk"; do
              for dir in /system/app/YouTube /system/product/app/YouTube /product/app/YouTube /system_ext/app/YouTube; do
                  path="$dir/$base"
                  if [ -f "$path" ]; then 
                      mount -o bind "$MODDIR/app.apk" "$path"
                      chcon u:object_r:apk_data_file:s0 "$path" 2>/dev/null
                      break 2
                  fi
              done
          done
          EOF
          chmod 755 yt-magisk/post-fs-data.sh
          cd yt-magisk && zip -r9 ../YouTube-Magisk.zip . && cd ..

          # YT Music Root Module Build
          cp -r template ytm-magisk
          cp YTMusic-Root.apk ytm-magisk/app.apk
          echo -e "id=morphe.ytm\npackage=com.google.android.apps.youtube.music\nname=YT Music Morphe (Advanced Root)\nversion=1.0\nauthor=${{ github.actor }}\ndescription=Morphe patched YT Music with auto-downgrade and dynamic mount." > ytm-magisk/module.prop
          
          cat << 'EOF' > ytm-magisk/post-fs-data.sh
          #!/system/bin/sh
          MODDIR=${0%/*}
          for base in "YTMusic.apk" "base.apk"; do
              for dir in /system/app/YTMusic /system/product/app/YTMusic /product/app/YTMusic /system_ext/app/YTMusic; do
                  path="$dir/$base"
                  if [ -f "$path" ]; then 
                      mount -o bind "$MODDIR/app.apk" "$path"
                      chcon u:object_r:apk_data_file:s0 "$path" 2>/dev/null
                      break 2
                  fi
              done
          done
          EOF
          chmod 755 ytm-magisk/post-fs-data.sh
          cd ytm-magisk && zip -r9 ../YTMusic-Magisk.zip . && cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          files: |
            *.apk
            *.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
